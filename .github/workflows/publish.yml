name: Commit datapackage.json
  uses: stefanzweifel/git-auto-commit-action@v5
  with:
    commit_message: Atualiza datapackage automaticamente
    file_pattern: datapackage/datapackage.json

name: Publicar dataset no CKAN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install pandas frictionless dpckan

      - name: Gerar datapackage
        run: python scripts/gerar_datapackage.py

      - name: Publicar no CKAN
        env:
          CKAN_HOST: ${{ secrets.CKAN_HOST }}
          CKAN_KEY: ${{ secrets.CKAN_KEY }}
        run: python scripts/publish_ckan.py
